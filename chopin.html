<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frédéric Chopin - Escola de Pianos</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
            <span class="me-2 fs-4">🎹</span> Escola de Pianos
          </a>
         
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                  data-bs-target="#navbarNav" aria-controls="navbarNav"
                  aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          
        </div>
      </nav>
      <section class="container my-5 text-center">
        <div class="row justify-content-center g-4 mb-4">
          <div class="col-md-4 col-sm-6">
            <img src="./img/chopin.png" class="img-fluid rounded shadow" style="max-width: 70%;" alt="Chopin 1">
          </div>
          <div class="col-md-4 col-sm-6">
            <img src="./img/chopin6.png" class="img-fluid rounded shadow" style="max-width: 56%;" alt="Chopin 2">
          </div>
          <div class="col-md-4 col-sm-6">
            <img src="./img/chopin4.png" class="img-fluid rounded shadow" style="max-width: 70%;" alt="Chopin 3">
          </div>
        </div>
        
        <h1 class="fw-bold">Frédéric Chopin</h1>
        <p class="lead mt-3 text-muted">
          O mestre do romantismo, suas composições são puro sentimento. Estudar com Chopin é mergulhar na alma do piano.
        </p>
        <p class="text-secondary">
          Seus noturnos, valsas e polonaises inspiram até hoje pianistas do mundo inteiro. Venha aprender com quem escreveu a história.
        </p>
      </section>
</body>
</html>
